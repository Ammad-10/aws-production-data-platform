# Phase 1.2 / 5.4: CI pipeline calling scripts/deploy.sh
# Set CI/CD variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (masked), AWS_REGION (optional)
# For image build (when scripts/build_and_push_images.sh builds): use a runner with Docker or run build separately.

stages:
  - deploy

variables:
  ENVIRONMENT: dev
  AWS_REGION: us-east-1

.deploy_base:
  image:
    name: hashicorp/terraform:1.6
    entrypoint: [""]
  before_script:
    - apk add --no-cache bash curl aws-cli kubectl
    - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
    - aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
    - aws configure set region "${AWS_REGION:-us-east-1}"
  script:
    - chmod +x scripts/*.sh
    - ./scripts/deploy.sh "$ENVIRONMENT"

deploy:dev:
  extends: .deploy_base
  stage: deploy
  variables:
    ENVIRONMENT: dev
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "main"

deploy:prod:
  extends: .deploy_base
  stage: deploy
  variables:
    ENVIRONMENT: prod
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
